<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        :root {
            --bg-primary: #36393f;
            --bg-secondary: #2f3136;
            --text-normal: #dcddde;
            --text-muted: #72767d;
            --accent: #5865F2;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-normal);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Overlay for username selection */
        #login-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background-color: var(--bg-secondary);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #40444b;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: var(--accent);
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover { background-color: #4752C4; }

        /* Main Chat Interface */
        #chat-container {
            display: none; /* Hidden until username is set */
            flex-direction: column;
            height: 100%;
        }

        #messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message { display: flex; flex-direction: column; }
        .message-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
        .username { font-weight: bold; color: white; }
        .timestamp { font-size: 12px; color: var(--text-muted); }
        .content { line-height: 1.4; }

        #input-area {
            padding: 20px;
            background-color: var(--bg-primary);
        }

        #message-input {
            width: calc(100% - 20px); /* Account for padding */
            padding: 15px;
            border-radius: 8px;
            background-color: #40444b;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Welcome</h2>
            <input type="text" id="username-input" placeholder="Enter your name..." autofocus>
            <button onclick="joinChat()">Join</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Message" onkeypress="handleKeyPress(event)">
        </div>
    </div>

    <script>
        let ws;
        let currentUser = "";

        function joinChat() {
            const nameInput = document.getElementById('username-input');
            if (nameInput.value.trim() === "") return;

            currentUser = nameInput.value.trim();
            
            // Hide login, show chat
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('message-input').focus();

            // Initialize WebSocket connection
            ws = new WebSocket("ws://localhost:8765");

            // Event listener for incoming messages from the server
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                displayMessage(data.user, data.text);
            };

            ws.onerror = function(error) {
                console.error("WebSocket Error: ", error);
            };
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                const input = document.getElementById('message-input');
                const text = input.value.trim();
                
                if (text !== "" && ws && ws.readyState === WebSocket.OPEN) {
                    // Package the message and username as a JSON object
                    const messagePayload = {
                        user: currentUser,
                        text: text
                    };
                    ws.send(JSON.stringify(messagePayload));
                    input.value = "";
                }
            }
        }

        function displayMessage(user, text) {
            const messagesDiv = document.getElementById('messages');
            
            // Create elements for the message
            const messageWrapper = document.createElement('div');
            messageWrapper.className = 'message';

            const header = document.createElement('div');
            header.className = 'message-header';
            
            const usernameSpan = document.createElement('span');
            usernameSpan.className = 'username';
            usernameSpan.textContent = user;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.textContent = text;

            // Assemble and append
            header.appendChild(usernameSpan);
            messageWrapper.appendChild(header);
            messageWrapper.appendChild(contentDiv);
            
            messagesDiv.appendChild(messageWrapper);

            // Auto-scroll to the bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
